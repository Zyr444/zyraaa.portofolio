name: CI/CD Portfolio Auto-Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login ke Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }} \
            -t zryaaa444/zyr4portofolio:latest .
          docker push zryaaa444/zyr4portofolio:latest

  deploy-to-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Deploy ke EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H 47.129.98.137 >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/key.pem ubuntu@47.129.98.137 "
            echo '${{ secrets.DOCKER_PASSWORD }}' | sudo docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin &&
            sudo docker pull zryaaa444/zyr4portofolio:latest &&
            sudo docker stop portfolio-app || true &&
            sudo docker rm -f portfolio-app || true &&
            sudo fuser -k 80/tcp || true &&
            sudo docker run -d \
              --name portfolio-app \
              --restart always \
              -p 80:80 \
              zryaaa444/zyr4portofolio:latest
          "